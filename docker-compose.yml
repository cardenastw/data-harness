services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434/v1
      - MODEL_NAME=${MODEL_NAME:-qwen2.5:3b}
      - DATABASE_PATH=demo/coffee_shop.db
      - SQL_QUERY_TIMEOUT=30
      - SQL_MAX_ROWS=500
    depends_on:
      ollama:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  ollama_data:
